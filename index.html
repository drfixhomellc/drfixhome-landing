<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr Fix Home LLC</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
    }

    .hero {
      background: #1a1a1a;
      color: white;
      text-align: center;
      padding: 70px 20px;
    }

    .hero h1 {
      margin-bottom: 10px;
      font-size: 38px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 25px;
    }

    .btn {
      background: #ff6600;
      color: white;
      padding: 14px 24px;
      border: none;
      border-radius: 6px;
      font-size: 17px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: #e65c00;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background: rgba(0, 0, 0, 0.65);
    }

    .modal-content {
      background: #fff;
      margin: 5% auto;
      padding: 25px;
      width: 90%;
      max-width: 520px;
      border-radius: 10px;
      position: relative;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }

    .close {
      position: absolute;
      right: 15px;
      top: 10px;
      font-size: 28px;
      cursor: pointer;
      color: #333;
    }

    .modal-content h2 {
      margin-top: 0;
      margin-bottom: 10px;
      color: #1a1a1a;
    }

    .modal-content p {
      margin-top: 0;
      margin-bottom: 20px;
      color: #555;
    }

    form input,
    form select,
    form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
    }

    form textarea {
      min-height: 110px;
      resize: vertical;
    }

    .submit-btn {
      width: 100%;
      background: #ff6600;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 6px;
      font-size: 17px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #e65c00;
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1>Professional Handyman & Home Repair Services</h1>
    <p>Serving Queens, Brooklyn, Manhattan, Bronx, Staten Island & Nassau County</p>
    <button class="btn" onclick="openModal()">Request Free Estimate</button>
  </section>

  <div id="estimateModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>Request a Free Estimate</h2>
      <p>Select the service you need and send us your project details.</p>

      <form action="https://formspree.io/f/TU_ENDPOINT_AQUI" method="POST">
        <input type="text" name="name" placeholder="Full Name" required />
        <input type="tel" name="phone" placeholder="Phone Number" required />
        <input type="email" name="email" placeholder="Email Address" required />

        <select name="service" required>
          <option value="">Select a Service</option>
          <option value="Drywall Repair">Drywall Repair</option>
          <option value="Painting">Painting</option>
          <option value="Tile Installation">Tile Installation</option>
          <option value="Bathroom Repair">Bathroom Repair</option>
          <option value="Kitchen Repair">Kitchen Repair</option>
          <option value="Door Repair">Door Repair</option>
          <option value="Floor Repair">Floor Repair</option>
          <option value="Plumbing Repair">Plumbing Repair</option>
          <option value="Carpentry">Carpentry</option>
          <option value="General Handyman Service">General Handyman Service</option>
          <option value="Other">Other</option>
        </select>

        <textarea name="message" placeholder="Describe your project"></textarea>

        <button type="submit" class="submit-btn">Send Request</button>
      </form>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById("estimateModal").style.display = "block";
    }

    function closeModal() {
      document.getElementById("estimateModal").style.display = "none";
    }

    window.onclick = function(event) {
      const modal = document.getElementById("estimateModal");
      if (event.target === modal) {
        modal.style.display = "none";
      }
    };

    window.onload = function() {
      setTimeout(function() {
        openModal();
      }, 2500);
    };
  </script>

</body>
</html>
